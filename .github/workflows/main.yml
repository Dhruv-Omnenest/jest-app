name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ── Step 1: Test + Coverage Gate ──────────────────────────────
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm install --save-dev ts-node

      - name: Update snapshots
        run: npx jest --updateSnapshot --forceExit

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --forceExit

      - name: Check coverage is ≥ 80%
        run: |
          FOUND=$(grep -h "^LF:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          HIT=$(grep -h "^LH:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          PCT=$(( HIT * 100 / FOUND ))
          echo "Coverage: $PCT%"
          [ "$PCT" -ge 80 ] || { echo " Coverage $PCT% < 80%. Failing."; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ── Step 2: SonarCloud Analysis (FIXED) ───────────────────────
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5 # This works for both Cloud and Server
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Dhruv-Omnenest_jest-app
            -Dsonar.organization=dhruv-omnenest
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.qualitygate.wait=true
            -Dsonar.projectName=jest-sonarcube
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.inclusions=src/**/*.ts,src/**/*.tsx
            -Dsonar.exclusions=src/**/*.test.ts,src/**/*.test.tsx,src/setupTests.ts,src/main.tsx,node_modules/**,dist/**,coverage/**
            -Dsonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.tsconfigPath=tsconfig.json
  # ── Step 3: Deploy ──────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: sonar
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install
      - run: npm run build

      - name: Deploy
        run: echo " Deploy your app here (Vercel / S3 / Azure / etc.)"